<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Guide utilisateur - Mouton Vigilant</title>

  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#0B1F3A">

  <style>
    .pdf-zone {
      width: 100%;
      height: 75vh;
      border: 1px solid #2f4363;
      border-radius: 18px;
      overflow: hidden;
      background: #ffffff;
      margin-top: 15px;
    }

    .pdf-zone iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }
  </style>
</head>

<body>

<main class="app">

  <header class="app-header">
    <img src="logo.png" class="logo" alt="Mouton Vigilant">
    <h1>🐑 Guide utilisateur</h1>
    <p class="intro">Aide et notice de Mouton Vigilant</p>
  </header>

  <section class="page-section active">
    <div class="card">
      <h2>📖 Notice utilisateur</h2>

      <a class="btn-alerte" href="./index.html">
        🏠 Retour à l'application
      </a>

      <div class="pdf-zone">
        <iframe src="./Mouton_Vigilant_notice_logo_v1.pdf"></iframe>
      </div>
    </div>
  </section>

</main>

</body>
</html>
