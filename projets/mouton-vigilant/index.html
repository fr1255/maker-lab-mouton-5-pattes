<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mouton Vigilant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1F3A">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>

<body>

<main class="page">

  <section class="hero">
    <img src="logo.png" class="logo" alt="Mouton Vigilant">

    <h1>🐑 Mouton Vigilant</h1>
    <p id="bonjour" class="intro">Bonjour</p>

    <p class="intro">
      Une application simple pour ne plus oublier vos traitements.
    </p>

    <a class="btn" href="./Mouton_Vigilant_notice_logo_v1.pdf" target="_blank">
      📄 Ouvrir le guide utilisateur
    </a>
  </section>

  <section class="card">
    <h2>💊 Aujourd'hui</h2>
    <div id="listeMedicaments"></div>

    <button id="activerAlarmes" class="btn-alerte">
      🔔 Activer les alarmes
    </button>
  </section>

  <section class="card">
    <h2>➕ Paramétrer un médicament</h2>

    <label for="medNom">Nom du médicament</label>
    <input id="medNom" type="text" placeholder="Ex : Levothyrox">

    <label for="medHeure">Heure de prise</label>
    <input id="medHeure" type="time">

    <label for="medNombre">Nombre / quantité</label>
    <input id="medNombre" type="text" placeholder="Ex : 1 comprimé">

    <label for="medDate">Date de début</label>
    <input id="medDate" type="date">

    <button id="ajouterMedicament" class="btn-alerte">
      💊 Ajouter le médicament
    </button>
  </section>

  <section class="card">
    <h2>☀️ Vitamine D</h2>
    <p>
      Prochaine prise :
      <strong>21 septembre 2026</strong>
    </p>
  </section>

  <section class="card">
    <h2>📅 Historique</h2>
    <div id="historique"></div>
  </section>

  <section class="card">
    <h2>⚙️ Paramètres</h2>

    <label for="prenom">Prénom</label>
    <input id="prenom" type="text" placeholder="Entrez votre prénom">

    <button id="sauverPrenom" class="btn-alerte">
      💾 Enregistrer
    </button>
  </section>

</main>

<script src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
  }
</script>

</body>
</html>
